{
  "experiment_name": "minimal_debug",
  "data": {
    "batch_size": 2,
    "num_workers": 0,
    "shuffle": true,
    "train_sources": [
      {
        "name": "waymo",
        "use_synthetic": true,
        "synthetic_length": 8,
        "image_size": [64, 64],
        "temporal_window": 4,
        "future_steps": 20,
        "history_steps": 16
      }
    ],
    "val_sources": [
      {
        "name": "waymo",
        "use_synthetic": true,
        "synthetic_length": 4,
        "image_size": [64, 64],
        "temporal_window": 4,
        "future_steps": 20,
        "history_steps": 16
      }
    ]
  },
  "model": {
    "vision_encoder_type": "lite_vit",
    "vision_hidden_dim": 64,
    "ego_encoder_type": "transformer",
    "text_backend": "hash",
    "text_vocab_size": 512,
    "text_max_length": 16,
    "rationale_vocab_size": 512,
    "rationale_max_length": 12,
    "fusion_dim": 64,
    "fusion_heads": 4,
    "fusion_layers": 2,
    "dropout": 0.1,
    "max_fusion_tokens": 96,
    "lite_vit_patch_size": 16,
    "ego_transformer_heads": 4,
    "ego_transformer_layers": 2
  },
  "losses": {
    "waypoint_weight": 1.0,
    "behavior_weight": 1.0,
    "rationale_weight": 0.2,
    "smoothness_weight": 0.1,
    "preference_weight": 0.0,
    "waypoint_final_step_weight": 2.0
  },
  "logging": {
    "use_tensorboard": false,
    "log_every_n_steps": 1,
    "output_dir": "outputs",
    "run_name": "minimal_debug"
  },
  "evaluation": {
    "save_visualizations": true,
    "num_visualizations": 2,
    "eval_every_n_epochs": 1
  },
  "training": {
    "seed": 7,
    "epochs": 1,
    "learning_rate": 0.001,
    "weight_decay": 0.0001,
    "grad_clip_norm": 1.0,
    "use_amp": false,
    "device": "cpu",
    "max_steps_per_epoch": 1
  }
}
